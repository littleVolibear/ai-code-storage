server:
  port: 8080

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:plandeduce;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      encoding: UTF-8

plan:
  deduce:
    default-full-save-interval-seconds: 600
    default-speed: 1
    tick-interval-ms: 1000
    max-worker-threads: 8

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
