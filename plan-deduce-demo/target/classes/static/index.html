<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Plan Deduce Demo</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 24px; }
        button { margin: 4px; padding: 8px 12px; }
        pre { background: #f5f5f5; padding: 12px; height: 360px; overflow: auto; }
    </style>
</head>
<body>
<h2>推演进度条 Demo</h2>
<p>先点“连接 WebSocket”，再点“初始化播放”。</p>
<button onclick="connect()">连接 WebSocket</button>
<button onclick="call('/plan/sendPlanDeduce?dbName=1&skip=0&sessionId=s1')">初始化播放</button>
<button onclick="call('/plan/skip?dbName=1&skip=6&sessionId=s1')">跳转 6 秒</button>
<button onclick="call('/plan/skip?dbName=1&skip=11&sessionId=s1')">跳转 11 秒</button>
<button onclick="call('/plan/skip?dbName=1&skip=20&sessionId=s1')">跳转 20 秒</button>
<button onclick="call('/plan/speed?dbName=1&speed=2&sessionId=s1')">2倍速</button>
<button onclick="call('/plan/startOrStop?dbName=1&flag=0&sessionId=s1')">暂停</button>
<button onclick="call('/plan/startOrStop?dbName=1&flag=1&sessionId=s1')">开始</button>
<button onclick="call('/plan/fullSaveInterval?dbName=1&fullSaveIntervalSeconds=20&sessionId=s1')">改为20秒全量</button>
<pre id="log"></pre>
<script>
    let ws;
    function log(msg) {
        const el = document.getElementById('log');
        el.textContent += msg + '\n';
        el.scrollTop = el.scrollHeight;
    }
    function connect() {
        ws = new WebSocket('ws://localhost:8080/ws/planDeduce?sessionId=s1');
        ws.onopen = () => log('WebSocket 已连接');
        ws.onmessage = e => log(e.data);
        ws.onclose = () => log('WebSocket 已关闭');
    }
    function call(url) {
        fetch(url).then(r => r.json()).then(j => log('HTTP: ' + JSON.stringify(j)));
    }
</script>
</body>
</html>
